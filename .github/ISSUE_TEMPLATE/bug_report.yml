name: Bug Report
description: Report a bug to help us improve Needle
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the sections below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: When I call collection.search() with a filter, it returns incorrect results...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Create a database with '...'
        2. Insert vectors with '...'
        3. Search with '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened.
    validations:
      required: true

  - type: textarea
    id: error_messages
    attributes:
      label: Error Messages
      description: Paste any error messages or stack traces.
      render: shell

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproduction
      description: Provide minimal code to reproduce the issue.
      render: rust
      placeholder: |
        use needle::Database;

        fn main() -> needle::Result<()> {
            // Your reproduction code here
            Ok(())
        }

  - type: input
    id: needle_version
    attributes:
      label: Needle Version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: rust_version
    attributes:
      label: Rust Version
      placeholder: "1.85.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Ubuntu / Debian
        - macOS
        - Windows
        - Other Linux
        - Other
    validations:
      required: true

  - type: input
    id: arch
    attributes:
      label: Architecture
      placeholder: "x86_64, ARM64"

  - type: input
    id: feature_flags
    attributes:
      label: Feature Flags
      placeholder: "server,metrics,hybrid"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: |
        Any other context about the problem (database size, memory usage, intermittent vs consistent, etc.).

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this bug hasn't been reported
          required: true
        - label: I have tested with the latest version of Needle
