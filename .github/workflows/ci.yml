name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Fast gate: format + lint + unit tests (~2 min). All other jobs depend on this.
  quick-check:
    name: Quick Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e18c1f174b91f20 # stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-quick-${{ hashFiles('**/Cargo.lock') }}
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy --features full -- -D warnings
      - name: Unit tests
        run: cargo test --lib

  openapi-sync:
    needs: quick-check
    name: OpenAPI Spec Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e18c1f174b91f20 # stable
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-openapi-${{ hashFiles('**/Cargo.lock') }}
      - name: Verify docs/openapi.json is up to date
        run: |
          echo 'fn main() { print!("{}", needle::server::openapi_spec_json()); }' > examples/gen_openapi.rs
          cargo run --features server --example gen_openapi > /tmp/openapi.json
          rm examples/gen_openapi.rs
          diff docs/openapi.json /tmp/openapi.json || (echo "::error::docs/openapi.json is out of date. Regenerate with: cargo run --features server --example gen_openapi > docs/openapi.json" && exit 1)

  test:
    needs: quick-check
    name: Test (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
        include:
          - os: ubuntu-latest
            rust: nightly

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e18c1f174b91f20 # master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Run tests (all features)
        run: cargo test --features full --verbose

  lint:
    needs: quick-check
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e18c1f174b91f20 # master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --features full -- -D warnings

      - name: Audit expect() calls in production code
        run: |
          # Find expect() calls in src/ excluding test modules and experimental/
          EXPECT_HITS=$(grep -rn '\.expect(' src/ \
            --include='*.rs' \
            | grep -v '#\[cfg(test)\]' \
            | grep -v 'mod tests' \
            | grep -v 'src/experimental/' \
            | grep -v '#\[test\]' \
            | grep -v '// allow-expect' \
            || true)
          if [ -n "$EXPECT_HITS" ]; then
            echo "::warning::Found expect() calls in production code. Prefer proper error handling with ? and Result<T>."
            echo "$EXPECT_HITS"
            echo ""
            echo "If an expect() is intentional, add '// allow-expect' on the same line."
          fi

  docs:
    needs: quick-check
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e18c1f174b91f20 # master
        with:
          toolchain: stable

      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --features full

  bench:
    needs: quick-check
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e18c1f174b91f20 # master
        with:
          toolchain: stable

      - name: Run benchmarks (compile check)
        run: cargo bench --no-run

  examples:
    needs: quick-check
    name: Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e18c1f174b91f20 # stable

      - name: Compile-check all examples
        run: cargo build --examples --features full

  coverage:
    needs: quick-check
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e18c1f174b91f20 # master
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@8a04e7e1b5765b8b4f1f6bef476643e1b0676f60 # cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --features full --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5.4.3
        with:
          files: lcov.info
          fail_ci_if_error: true

  msrv:
    needs: quick-check
    name: Minimum Supported Rust Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e18c1f174b91f20 # master
        with:
          toolchain: "1.85"

      - name: Check MSRV
        run: cargo check --features full
