# Purpose: Run tech debt dashboard on PRs and post results as a PR comment for visibility.
name: Tech Debt Dashboard

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  tech-debt:
    name: Tech Debt Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Generate tech debt dashboard
        id: debt
        run: |
          output=$(make count-debt 2>&1)
          # Store as step output (multi-line)
          {
            echo "report<<EOF"
            echo "$output"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const body = `### 📊 Tech Debt Dashboard

            \`\`\`
            ${{ steps.debt.outputs.report }}
            \`\`\`

            <sub>Generated by \`make count-debt\`. Reduce counts by converting \`.unwrap()\` → \`?\` ([contributing guide](../blob/main/CONTRIBUTING.md#error-handling-tech-debt)).</sub>`;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '### 📊 Tech Debt Dashboard';
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload debt report as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tech-debt-report
          path: /dev/stdin
          if-no-files-found: ignore
        continue-on-error: true

  file-size-check:
    name: File Size Limit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check for oversized files
        run: |
          MAX_LINES=1000
          EXIT_CODE=0

          echo "Checking for source files exceeding $MAX_LINES lines..."
          echo ""

          # Find Rust source files, excluding tests, benches, and generated code
          while IFS= read -r file; do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt "$MAX_LINES" ]; then
              echo "::warning file=${file}::${file} has ${lines} lines (limit: ${MAX_LINES})"
              EXIT_CODE=1
            fi
          done < <(find src/ crates/ -name '*.rs' \
            -not -path '*/tests/*' \
            -not -path '*/benches/*' \
            -not -path '*/target/*' \
            -not -name '*_test.rs' \
            -not -name '*_tests.rs')

          if [ "$EXIT_CODE" -eq 1 ]; then
            echo ""
            echo "⚠️  Some files exceed the ${MAX_LINES}-line limit."
            echo "Consider splitting large files into smaller modules."
            echo "See CONTRIBUTING.md for guidance on module organization."
            exit 1
          else
            echo "✅ All source files are within the ${MAX_LINES}-line limit."
          fi
