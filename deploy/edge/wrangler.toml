name = "needle-edge"
main = "cloudflare-worker.js"
compatibility_date = "2024-01-01"

[vars]
NEEDLE_MAX_VECTORS = "100000"
NEEDLE_MAX_DIMENSIONS = "768"

# KV namespace for vector storage
