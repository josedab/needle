# Default development configuration
#
# The root crate uses crate-type = ["cdylib", "rlib"] for Python/WASM bindings.
# This adds linker overhead to every build. For fast iteration use:
#   make quick        — format check + lint + unit tests (skips cdylib)
#   cargo test --lib  — unit tests only (skips cdylib)
#   cargo t           — alias for: cargo test --features full

[alias]
build-all    = "build --features full"
build-quick  = "build --features server,metrics"
test-all     = "test --features full"
test-quick   = "test --lib"
lint         = "clippy --features full"
t            = "test --features full"

[env]
RUST_BACKTRACE = "1"

# ── Platform-specific linker settings ─────────────────────────────────────────
# Faster linking significantly reduces incremental build times.
# Uncomment the section matching your OS after installing the required linker.

# --- Linux (x86_64) ---
# Install mold: sudo apt install mold  (or: https://github.com/rui314/mold/releases)
# Alternatively, install lld: sudo apt install lld
# [target.x86_64-unknown-linux-gnu]
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# --- Linux (aarch64) ---
# [target.aarch64-unknown-linux-gnu]
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# --- macOS ---
# The default Apple linker is already fast. For even faster linking, use lld:
# Install: brew install llvm
# [target.x86_64-apple-darwin]
# rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/opt/llvm/bin/ld64.lld"]
# [target.aarch64-apple-darwin]
# rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/opt/llvm/bin/ld64.lld"]
